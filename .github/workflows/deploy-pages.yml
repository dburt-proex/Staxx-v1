name: deploy-foundry-learning-os

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore application source automatically
        shell: bash
        run: |
          set -euo pipefail
          test -f hydrate-source.mjs || { echo "Missing hydrate-source.mjs"; exit 1; }
          test -f foundry-source-bundle.json.gz.b64 || { echo "Missing source bundle"; exit 1; }
          node hydrate-source.mjs
          test -f package.json || { echo "Source restore did not create package.json"; exit 1; }
          test -f package-lock.json || { echo "Source restore did not create package-lock.json"; exit 1; }
          echo "Application source restored successfully."

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
